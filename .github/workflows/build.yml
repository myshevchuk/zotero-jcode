name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify tag matches manifest version (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VERSION=$(jq -r '.version' addon/manifest.json)
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag v$TAG does not match manifest.json version $MANIFEST_VERSION. Bump manifest.json before tagging."
            exit 1
          fi
          echo "Tag and manifest agree: $MANIFEST_VERSION"

      - name: Run pure-layer tests
        run: npm test

      - name: Build .xpi
        run: bash build.sh

      - name: Upload .xpi as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zotero-jcode-${{ github.sha }}
          path: zotero-jcode.xpi
          if-no-files-found: error

  release:
    # Tag pushes (v*) get a GitHub Release with the .xpi attached. We
    # reuse the artifact the build job produced rather than rebuilding,
    # so the release asset is byte-identical to what CI tested.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download .xpi from the build job
        uses: actions/download-artifact@v4
        with:
          name: zotero-jcode-${{ github.sha }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: zotero-jcode.xpi
          fail_on_unmatched_files: true
          generate_release_notes: true
