<vbox id="zotero-prefpane-jcode">
  <html:label>Leave the path empty to use the table bundled with the plugin. Set a path on disk to override with your own TSV.</html:label>

  <hbox align="center">
    <html:label for="jcode-tsv-path">Custom journal table (TSV) path:</html:label>
    <html:input type="text" id="jcode-tsv-path"></html:input>
  </hbox>

  <hbox>
    <button id="jcode-tsv-browse" label="Browse..."/>
    <button id="jcode-tsv-reset" label="Reset to bundled default"/>
  </hbox>
</vbox>
